services:
  postgres:
    image: postgres:16-alpine
    container_name: adeni-postgres
    environment:
      POSTGRES_DB: adeni
      POSTGRES_USER: adeni
      POSTGRES_PASSWORD: adeni_dev_password
    ports:
      - "5432:5432"
    volumes:
      - adeni_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adeni -d adeni"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  adeni_pg_data:
