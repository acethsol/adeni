services:
  redis:
    image: redis:7-alpine
    container_name: adeni-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: adeni-postgres
    environment:
      POSTGRES_DB: adeni
      POSTGRES_USER: adeni
      POSTGRES_PASSWORD: adeni_dev_password
    ports:
      - "5432:5432"
    volumes:
      - adeni_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adeni -d adeni"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    profiles: [ui]
    image: adminer:latest
    container_name: adeni-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    profiles: [ui]
    image: redis/redisinsight:latest
    container_name: adeni-redisinsight
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: adeni-redis
    ports:
      - "5540:5540"
    volumes:
      - adeni_redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  adeni_pg_data:
  adeni_redisinsight_data:
