name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Adeni.slnx

      - name: Build
        run: dotnet build Adeni.slnx --no-restore -c Release

      - name: Test with coverage
        run: dotnet test Adeni.slnx --no-build -c Release --collect:"XPlat Code Coverage"

      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive
